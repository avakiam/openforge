<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenForge</title>
    <link rel="stylesheet" href="/vendor/xterm/css/xterm.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="auth-view" class="auth-shell hidden">
      <section class="auth-panel">
        <div class="auth-brand">
          <span class="mark">OF</span>
          <h1>OpenForge</h1>
        </div>

        <form id="setup-form" class="auth-form hidden">
          <h2 data-i18n="firstAdmin">First Admin</h2>
          <label>
            <span data-i18n="username">Username</span>
            <input name="username" autocomplete="username" required minlength="3" maxlength="32" />
          </label>
          <label>
            <span data-i18n="password">Password</span>
            <input name="password" type="password" autocomplete="new-password" required minlength="8" />
          </label>
          <button type="submit" data-i18n="createAccount">Create Account</button>
        </form>

        <form id="login-form" class="auth-form hidden">
          <h2 data-i18n="signIn">Sign In</h2>
          <label>
            <span data-i18n="username">Username</span>
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            <span data-i18n="password">Password</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit" data-i18n="signIn">Sign In</button>
        </form>

        <p id="auth-message" class="message" role="status"></p>
      </section>
    </main>

    <main id="app-view" class="app-shell hidden">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand-row">
            <span class="mark">OF</span>
            <div>
              <strong>OpenForge</strong>
              <span id="opencode-status" class="status-pill" data-i18n="checking">Checking</span>
            </div>
          </div>
          <div class="mode-tabs" role="tablist">
            <button id="terminals-mode-button" type="button" class="mode-tab active" data-mode="terminals" data-i18n="terminals">Terminals</button>
            <button id="agents-mode-button" type="button" class="mode-tab" data-mode="agents" data-i18n="agents">Agents</button>
          </div>
          <button id="new-terminal-button" class="primary-action" type="button" title="New terminal" data-i18n-title="newTerminalTitle">
            <span aria-hidden="true">+</span>
            <span data-i18n="newTerminal">New</span>
          </button>
          <button id="new-agent-button" class="primary-action hidden" type="button" title="New agent" data-i18n-title="newAgentTitle">
            <span aria-hidden="true">+</span>
            <span data-i18n="newAgent">New Agent</span>
          </button>
        </div>

        <nav id="session-list" class="session-list" aria-label="Terminals" data-i18n-aria-label="terminals"></nav>
        <nav id="agent-list" class="session-list hidden" aria-label="Agents" data-i18n-aria-label="agents"></nav>

        <div class="sidebar-bottom">
          <button id="install-button" class="secondary-action hidden" type="button" data-i18n="installOpenCode">Install OpenCode</button>
          <span id="signed-in-user" class="muted"></span>
          <button id="logout-button" class="ghost-action" type="button" data-i18n="signOut">Sign Out</button>
        </div>
      </aside>

      <section id="terminal-workspace" class="workspace">
        <header class="workspace-header">
          <div>
            <h2 id="terminal-title" data-i18n="noTerminal">No Terminal</h2>
            <p id="terminal-subtitle"></p>
          </div>
          <div class="header-actions">
            <button id="fit-button" class="icon-button" type="button" title="Fit terminal" aria-label="Fit terminal" data-i18n="fit" data-i18n-title="fitTerminal" data-i18n-aria-label="fitTerminal">Fit</button>
            <button id="kill-button" class="danger-action" type="button" data-i18n="close">Close</button>
          </div>
        </header>

        <div id="terminal-wrap" class="terminal-wrap">
          <div id="empty-state" class="empty-state" data-i18n="noTerminals">No terminals</div>
          <div id="terminal" class="terminal"></div>
        </div>
      </section>

      <section id="agents-workspace" class="workspace hidden">
        <header class="workspace-header">
          <div>
            <h2 id="agent-title" data-i18n="agents">Agents</h2>
            <p id="agent-subtitle"></p>
          </div>
          <div class="header-actions">
            <button id="run-agent-button" class="secondary-action" type="button" data-i18n="runNow">Run Now</button>
            <button id="save-agent-button" class="primary-action" type="button" data-i18n="save">Save</button>
            <button id="delete-agent-button" class="danger-action" type="button" data-i18n="delete">Delete</button>
          </div>
        </header>

        <div class="agent-workspace-body">
          <form id="agent-form" class="agent-form">
            <label>
              <span data-i18n="name">Name</span>
              <input id="agent-name-input" name="name" maxlength="80" />
            </label>
            <label>
              <span data-i18n="description">Description</span>
              <input id="agent-description-input" name="description" maxlength="400" />
            </label>
            <label>
              <span data-i18n="workingDirectory">Working directory</span>
              <span class="path-picker-row">
                <input id="agent-cwd-input" name="cwd" />
                <button id="browse-agent-cwd-button" type="button" class="secondary-action" data-i18n="browse">Browse</button>
              </span>
            </label>
            <label>
              <span data-i18n="prompt">Prompt</span>
              <textarea id="agent-prompt-input" name="prompt" rows="9"></textarea>
            </label>
            <label class="checkbox-row">
              <input id="agent-enabled-input" name="enabled" type="checkbox" />
              <span data-i18n="enabled">Enabled</span>
            </label>
            <div class="schedule-grid">
              <label>
                <span data-i18n="runTime">Run time</span>
                <input id="agent-time-input" name="time" type="time" value="09:00" />
              </label>
              <fieldset class="day-picker">
                <legend data-i18n="runDays">Run days</legend>
                <label><input type="checkbox" name="days" value="1" /> <span data-i18n="mondayShort">Mon</span></label>
                <label><input type="checkbox" name="days" value="2" /> <span data-i18n="tuesdayShort">Tue</span></label>
                <label><input type="checkbox" name="days" value="3" /> <span data-i18n="wednesdayShort">Wed</span></label>
                <label><input type="checkbox" name="days" value="4" /> <span data-i18n="thursdayShort">Thu</span></label>
                <label><input type="checkbox" name="days" value="5" /> <span data-i18n="fridayShort">Fri</span></label>
                <label><input type="checkbox" name="days" value="6" /> <span data-i18n="saturdayShort">Sat</span></label>
                <label><input type="checkbox" name="days" value="0" /> <span data-i18n="sundayShort">Sun</span></label>
              </fieldset>
            </div>
          </form>

          <section class="agent-history">
            <h3 data-i18n="runHistory">Run History</h3>
            <div id="agent-runs" class="run-list"></div>
          </section>
        </div>
      </section>
    </main>

    <dialog id="new-terminal-dialog">
      <form id="new-terminal-form" method="dialog" class="dialog-form">
        <h2 data-i18n="newTerminalHeading">New Terminal</h2>
        <label>
          <span data-i18n="name">Name</span>
          <input name="title" maxlength="80" placeholder="OpenCode" />
        </label>
        <label>
          <span data-i18n="workingDirectory">Working directory</span>
          <span class="path-picker-row">
            <input id="cwd-input" name="cwd" />
            <button id="browse-cwd-button" type="button" class="secondary-action" data-i18n="browse">Browse</button>
          </span>
        </label>
        <menu>
          <button value="cancel" type="button" id="cancel-new-terminal" data-i18n="cancel">Cancel</button>
          <button value="default" type="submit" data-i18n="create">Create</button>
        </menu>
      </form>
    </dialog>

    <dialog id="filesystem-dialog" class="wide-dialog">
      <form method="dialog" class="dialog-form">
        <h2 data-i18n="chooseFolder">Choose Folder</h2>
        <div class="directory-toolbar">
          <button id="fs-up-button" type="button" class="secondary-action" data-i18n="parentDirectory">Up</button>
          <code id="fs-current-path"></code>
        </div>
        <div id="fs-roots" class="root-list"></div>
        <div id="fs-list" class="directory-list" role="list"></div>
        <menu>
          <button value="cancel" type="button" id="cancel-filesystem" data-i18n="cancel">Cancel</button>
          <button value="default" type="button" id="select-cwd-button" data-i18n="choose">Choose</button>
        </menu>
      </form>
    </dialog>

    <dialog id="confirm-close-dialog">
      <form method="dialog" class="dialog-form">
        <h2 id="confirm-close-title" data-i18n="closeTerminalTitle">Close terminal?</h2>
        <p id="confirm-close-body" class="dialog-copy"></p>
        <menu>
          <button value="cancel" type="button" id="cancel-close-session" data-i18n="cancel">Cancel</button>
          <button value="default" type="button" id="confirm-close-session" class="danger-action" data-i18n="close">Close</button>
        </menu>
      </form>
    </dialog>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/vendor/xterm/lib/xterm.js"></script>
    <script src="/vendor/xterm-addon-fit/lib/addon-fit.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
